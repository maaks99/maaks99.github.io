<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="contact-section">
        <div class="contact-info">
            <div><i class="fas fa-map-marker-alt"></i>Address</div>
            <div><i class="fas fa-envelope"></i>yourEmail@email.pl</div>
            <div><i class="fas fa-phone"></i>+99 999 999 999</div>
            <div><i class="fas fa-clock"></i>Mon - Fri 7:00 AM to 4:00 PM</div>
        </div>

        <div class="contact-form">
            <h2>Contact Us</h2>
            <form action="" class="contact">
                <input type="text" name="name" class="text-box" placeholder="Your Name">
                <input type="email" name="email" class="text-box" placeholder="Your Email">
                <textarea name="message" rows="5" placeholder="Your Message"></textarea>
                <input type="submit" name="submit" class="send-btn" value="Send">
            </form>
        </div>
    </div>
</body>
</html>
